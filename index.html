<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SBTI人格测试</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,sans-serif;background:#667eea;overflow:hidden}
.h{position:fixed;top:0;left:0;right:0;padding:16px;background:rgba(255,255,255,.2);display:flex;gap:12px;align-items:center;z-index:10}
.pt{color:#fff;font-size:14px}
.pb{flex:1;height:4px;background:rgba(255,255,255,.3);border-radius:2px}
.pf{height:100%;background:#fff;border-radius:2px}
.a{height:100vh;display:flex;align-items:center;justify-content:center;padding:70px 16px 20px}
.c{width:100%;max-width:340px;background:#fff;border-radius:20px;padding:28px 20px;box-shadow:0 15px 40px rgba(0,0,0,.3)}
.t{font-size:28px;font-weight:700;text-align:center;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.s{text-align:center;color:#666;font-size:13px;margin-bottom:24px}
.b{display:block;width:100%;padding:14px;font-size:16px;color:#fff;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:30px;margin-bottom:16px}
.n{display:inline-block;padding:4px 10px;background:#667eea;color:#fff;border-radius:12px;font-size:12px;margin-bottom:12px}
.q{font-size:16px;font-weight:600;line-height:1.5;margin-bottom:20px}
.o{display:flex;flex-direction:column;gap:8px}
.i{padding:14px;background:#f5f5f5;border:1px solid #ddd;border-radius:12px;font-size:14px;text-align:center}
.i:hover{background:#eee}
.i.s{background:#667eea;color:#fff;border-color:#667eea}
.r{text-align:center;font-size:24px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.rc{text-align:center;color:#666;font-family:monospace;margin-bottom:12px}
.m{width:120px;height:120px;border-radius:12px;margin:12px auto;display:block;box-shadow:0 5px 20px rgba(0,0,0,.2)}
.d{background:#f5f5f5;padding:12px;border-radius:10px;font-size:12px;line-height:1.6;margin-bottom:16px}
.hid{display:none}
</style>
</head>
<body>
<div class="h">
<span class="pt" id="pt">开始</span>
<div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
</div>
<div class="a">
<div class="c" id="sc">
<h1 class="t">SBTI人格测试</h1>
<p class="s">仅供娱乐</p>
<button class="b" id="sb">开始测试</button>
</div>
<div class="c hid" id="qc">
<div class="n" id="qn">第1题</div>
<div class="q" id="qt"></div>
<div class="o" id="os"></div>
</div>
<div class="c hid" id="rc">
<h2 class="r" id="rt"></h2>
<p class="rc" id="rco"></p>
<img class="m" id="ri" src="">
<p style="text-align:center;color:#667eea;font-size:13px;margin-bottom:10px" id="rin"></p>
<div class="d" id="rd"></div>
<button class="b" id="rb">重新测试</button>
</div>
</div>
<script src="data.js"></script>
<script>
let i=0,A={},N=Q.length;
document.getElementById('sb').onclick=function(){
  document.getElementById('sc').className='c hid';
  document.getElementById('qc').className='c';
  show(0);
};
function show(n){
  i=n;
  document.getElementById('pt').textContent=(n+1)+'/'+N;
  document.getElementById('pf').style.width=(n+1)/N*100+'%';
  document.getElementById('qn').textContent='第'+(n+1)+'题';
  document.getElementById('qt').textContent=Q[n].text;
  document.getElementById('os').innerHTML=Q[n].options.map(o=>'<div class="i" onclick="ans('+o.value+',this)">'+o.label+'</div>').join('');
}
function ans(v,e){
  A[Q[i].id]=v;
  e.parentElement.querySelectorAll('.i').forEach(x=>x.className='i');
  e.className='i s';
  setTimeout(()=>{
    if(i<N-1){
      document.getElementById('qc').className='c hid';
      setTimeout(()=>{
        document.getElementById('qc').className='c';
        show(i+1);
      },200);
    }else{
      res();
    }
  },250);
}
function res(){
  document.getElementById('qc').className='c hid';
  document.getElementById('rc').className='c';
  document.getElementById('pf').style.width='100%';
  let c=calc(),t=T[c];
  document.getElementById('rt').textContent=t.cn;
  document.getElementById('rco').textContent=t.code;
  document.getElementById('ri').src='image/'+c+'.png';
  document.getElementById('ri').onerror=function(){this.src='image/'+c+'.jpg'};
  document.getElementById('rin').textContent=t.intro||'';
  document.getElementById('rd').textContent=t.desc||'';
}
function calc(){
  let s={};
  Q.forEach(q=>{if(A[q.id])s[q.dim]=(s[q.dim]||0)+A[q.id]});
  let av=(a,b,c)=>((s[a]||2)+(s[b]||2)+(s[c]||2))/3;
  let S=av('S1','S2','S3'),E=av('E1','E2','E3'),A=av('A1','A2','A3'),Ac=av('Ac1','Ac2','Ac3'),So=av('So1','So2','So3');
  if(Ac<1.8)return'DEAD';
  if(s.E2>2.5&&So<2)return'ATM-er';
  if(s.E1<1.8&&s.So3>2.2)return'SOLO';
  if(s.S1<1.8&&s.S2<2)return'IMSB';
  if(s.So3>2.3&&s.A2>2.2)return'FAKE';
  if(s.E2>2.3&&A>2)return'MUM';
  if(s.So3>2.2)return'JOKE-R';
  if(Ac<2.2&&s.S1<2)return'MALO';
  if(S<2&&A<2)return'IMFW';
  if(Ac>2.5)return'GOGO';
  if(E>2.5)return'LOVE-R';
  if(A<1.8)return'DRUNK';
  if(S>2.5&&Ac>2.3)return'BOSS';
  if(s.S1>2.5)return'OJBK';
  if(So<1.8)return'CTRL';
  if(E<1.8)return'POOR';
  if(s.E1>2.5)return'SEXY';
  return'Dior-s';
}
document.getElementById('rb').onclick=function(){
  i=0;A={};
  document.getElementById('rc').className='c hid';
  document.getElementById('sc').className='c';
  document.getElementById('pf').style.width='0%';
  document.getElementById('pt').textContent='开始';
};
</script>
</body>
</html>
