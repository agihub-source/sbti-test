<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>SBTI 人格测试</title>
  <style>
    :root {
      --bg: #f6faf6;
      --panel: #ffffff;
      --text: #1e2a22;
      --muted: #6a786f;
      --line: #dbe8dd;
      --soft: #edf6ef;
      --accent: #6c8d71;
      --accent-strong: #4d6a53;
      --shadow: 0 16px 40px rgba(47, 73, 55, 0.08);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      height: 100%; 
      font-family: -apple-system, BlinkMacSystemSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      background: linear-gradient(180deg, #f8fff8 0%, #f6faf6 50%, #f2f7f3 100%);
      color: var(--text);
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* 顶部进度条 */
    .top-progress {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--line);
      z-index: 100;
    }
    .top-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      transition: width 0.3s ease;
    }
    
    /* 主容器 */
    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      padding-top: 24px;
      padding-bottom: 90px;
    }
    
    /* 卡片容器 */
    .card-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--panel);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      transform: translateX(0);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    
    .card.slide-left {
      transform: translateX(-100%);
      opacity: 0;
    }
    
    .card.slide-right {
      transform: translateX(100%);
      opacity: 0;
    }
    
    /* 问题编号 */
    .q-num {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    
    /* 进度点 */
    .q-dots {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .q-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--line);
    }
    
    .q-dot.done { background: var(--accent); }
    .q-dot.current { 
      background: var(--accent-strong); 
      width: 18px; 
      border-radius: 3px; 
    }
    
    /* 问题文字 */
    .q-text {
      font-size: 19px;
      font-weight: 600;
      line-height: 1.6;
      text-align: center;
      color: var(--text);
      margin-bottom: 24px;
      min-height: 60px;
    }
    
    /* 选项 */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .opt {
      background: var(--soft);
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }
    
    .opt:active {
      transform: scale(0.97);
    }
    
    .opt.selected {
      background: var(--accent);
      color: white;
      border-color: var(--accent-strong);
    }
    
    /* 底部导航 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--panel);
      border-top: 1px solid var(--line);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
    }
    
    .nav-btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    .nav-btn.prev-btn {
      background: var(--soft);
      color: var(--text);
      border: 1.5px solid var(--line);
    }
    
    .nav-btn.next-btn {
      background: var(--accent);
      color: white;
    }
    
    /* 开始页面 */
    .start-card {
      text-align: center;
    }
    
    .start-title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .start-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    
    .start-warning {
      font-size: 13px;
      color: var(--accent-strong);
      margin-bottom: 28px;
    }
    
    .start-btn {
      width: 100%;
      padding: 16px;
      font-size: 17px;
      font-weight: 600;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
    }
    
    /* 结果页面 */
    .result-card {
      text-align: center;
    }
    
    .result-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    
    .result-type {
      font-size: 34px;
      font-weight: 700;
      color: var(--accent-strong);
      margin-bottom: 4px;
    }
    
    .result-code {
      font-size: 17px;
      color: var(--muted);
      font-family: monospace;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    
    .result-img {
      width: 180px;
      height: 180px;
      border-radius: 18px;
      margin: 12px auto;
      box-shadow: var(--shadow);
    }
    
    .result-intro {
      font-size: 15px;
      font-style: italic;
      color: var(--accent);
      margin-bottom: 14px;
    }
    
    .result-desc {
      font-size: 14px;
      line-height: 1.75;
      text-align: left;
      background: var(--soft);
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    
    .result-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }
    
    .result-btn.primary {
      background: var(--accent);
      color: white;
    }
    
    .result-btn.secondary {
      background: var(--soft);
      color: var(--text);
      border: 1.5px solid var(--line);
    }
    
    .hidden { display: none !important; }
    
    /* 原作者信息 */
    .author-info {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
    }
    
    .author-info a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="top-progress">
    <div class="top-progress-fill" id="progressFill" style="width: 0%"></div>
  </div>
  
  <div class="app">
    <div class="card-container">
      <!-- 开始页面 -->
      <div class="card start-card" id="startScreen">
        <h1 class="start-title">SBTI 人格测试</h1>
        <p class="start-sub">Silly Big Personality Test</p>
        <p class="start-warning">⚠️ 仅供娱乐，不作诊断依据</p>
        <button class="start-btn" onclick="startQuiz()">开始测试</button>
        <div class="author-info">
          原作者：<a href="https://space.bilibili.com/417038183">B站@蛆肉儿串儿</a>
        </div>
      </div>
      
      <!-- 问题页面 -->
      <div class="card hidden" id="questionScreen">
        <div class="q-num" id="qNum">第 1 题 / 共 30 题</div>
        <div class="q-dots" id="qDots"></div>
        <div class="q-text" id="qText"></div>
        <div class="options" id="options"></div>
      </div>
      
      <!-- 结果页面 -->
      <div class="card result-card hidden" id="resultScreen">
        <p class="result-label">你的 SBTI 人格类型是</p>
        <h2 class="result-type" id="resultType"></h2>
        <p class="result-code" id="resultCode"></p>
        <img class="result-img" id="resultImg" src="" alt="人格图片">
        <p class="result-intro" id="resultIntro"></p>
        <div class="result-desc" id="resultDesc"></div>
        <button class="result-btn primary" onclick="restart()">重新测试</button>
      </div>
    </div>
  </div>
  
  <div class="bottom-nav hidden" id="bottomNav">
    <button class="nav-btn prev-btn" id="prevBtn" onclick="prevQuestion()">上一题</button>
    <button class="nav-btn next-btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题</button>
  </div>

    // 应用状态
    const app = {
      currentQ: 0,
      answers: {},
      totalQ: questions.length
    };
    
    // DOM 元素
    const dom = {
      startScreen: document.getElementById('startScreen'),
      questionScreen: document.getElementById('questionScreen'),
      resultScreen: document.getElementById('resultScreen'),
      bottomNav: document.getElementById('bottomNav'),
      progressFill: document.getElementById('progressFill'),
      qNum: document.getElementById('qNum'),
      qDots: document.getElementById('qDots'),
      qText: document.getElementById('qText'),
      options: document.getElementById('options'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      resultType: document.getElementById('resultType'),
      resultCode: document.getElementById('resultCode'),
      resultImg: document.getElementById('resultImg'),
      resultIntro: document.getElementById('resultIntro'),
      resultDesc: document.getElementById('resultDesc')
    };
    
    // 开始测试
    function startQuiz() {
      dom.startScreen.classList.add('hidden');
      dom.questionScreen.classList.remove('hidden');
      dom.bottomNav.classList.remove('hidden');
      renderQuestion();
    }
    
    // 渲染问题
    function renderQuestion() {
      const q = questions[app.currentQ];
      
      // 更新进度
      dom.progressFill.style.width = ((app.currentQ) / app.totalQ * 100) + '%';
      dom.qNum.textContent = `第 ${app.currentQ + 1} 题 / 共 ${app.totalQ} 题`;
      
      // 渲染进度点（每5题一组）
      renderDots();
      
      // 渲染问题文字
      dom.qText.textContent = q.text;
      
      // 渲染选项
      dom.options.innerHTML = q.options.map((opt, i) => {
        const selected = app.answers[q.id] === opt.value ? ' selected' : '';
        return `<div class="opt${selected}" data-value="${opt.value}" onclick="selectOption(${opt.value})">${opt.label}</div>`;
      }).join('');
      
      // 更新按钮状态
      dom.prevBtn.disabled = app.currentQ === 0;
      updateNextBtn();
    }
    
    // 渲染进度点
    function renderDots() {
      const total = Math.min(30, app.totalQ);
      let html = '';
      for (let i = 0; i < total; i++) {
        let cls = 'q-dot';
        if (i < app.currentQ) cls += ' done';
        else if (i === app.currentQ) cls += ' current';
        html += `<div class="${cls}"></div>`;
      }
      dom.qDots.innerHTML = html;
    }
    
    // 选择选项
    function selectOption(value) {
      const q = questions[app.currentQ];
      app.answers[q.id] = value;
      
      // 更新选中状态
      document.querySelectorAll('.opt').forEach(el => {
        el.classList.toggle('selected', parseInt(el.dataset.value) === value);
      });
      
      updateNextBtn();
      
      // 自动跳转下一题（短暂延迟）
      setTimeout(() => {
        if (app.currentQ < app.totalQ - 1) {
          nextQuestion();
        }
      }, 200);
    }
    
    // 更新下一题按钮
    function updateNextBtn() {
      const q = questions[app.currentQ];
      const answered = app.answers[q.id] !== undefined;
      
      if (app.currentQ === app.totalQ - 1) {
        dom.nextBtn.textContent = '查看结果';
        dom.nextBtn.disabled = !answered;
      } else {
        dom.nextBtn.textContent = '下一题';
        dom.nextBtn.disabled = !answered;
      }
    }
    
    // 下一题
    function nextQuestion() {
      if (app.currentQ === app.totalQ - 1) {
        showResult();
        return;
      }
      
      // 动画效果
      dom.questionScreen.classList.add('slide-left');
      
      setTimeout(() => {
        app.currentQ++;
        renderQuestion();
        dom.questionScreen.classList.remove('slide-left');
      }, 150);
    }
    
    // 上一题
    function prevQuestion() {
      if (app.currentQ === 0) return;
      
      // 动画效果
      dom.questionScreen.classList.add('slide-right');
      
      setTimeout(() => {
        app.currentQ--;
        renderQuestion();
        dom.questionScreen.classList.remove('slide-right');
      }, 150);
    }
    
    // 计算结果
    function calculateResult() {
      // 计算各维度得分
      const scores = {
        S1: 0, S2: 0, S3: 0,
        E1: 0, E2: 0, E3: 0,
        A1: 0, A2: 0, A3: 0,
        Ac1: 0, Ac2: 0, Ac3: 0,
        So1: 0, So2: 0, So3: 0
      };
      
      // 统计每个维度的回答
      const counts = { ...scores };
      
      questions.forEach(q => {
        if (app.answers[q.id] !== undefined) {
          scores[q.dim] += app.answers[q.id];
          counts[q.dim]++;
        }
      });
      
      // 计算平均分
      for (let dim in scores) {
        if (counts[dim] > 0) {
          scores[dim] = scores[dim] / counts[dim];
        }
      }
      
      // 根据得分确定人格类型
      return matchType(scores);
    }
    
    // 匹配人格类型
    function matchType(scores) {
      // 简化的匹配逻辑
      const avgS = (scores.S1 + scores.S2 + scores.S3) / 3;
      const avgE = (scores.E1 + scores.E2 + scores.E3) / 3;
      const avgA = (scores.A1 + scores.A2 + scores.A3) / 3;
      const avgAc = (scores.Ac1 + scores.Ac2 + scores.Ac3) / 3;
      const avgSo = (scores.So1 + scores.So2 + scores.So3) / 3;
      
      // 根据特征匹配类型
      if (avgAc < 1.8) return 'DEAD';
      if (scores.E2 > 2.5 && avgSo < 2) return 'ATM-er';
      if (scores.E1 < 1.8 && scores.So3 > 2.2) return 'SOLO';
      if (scores.S1 < 1.8 && scores.S2 < 2) return 'IMSB';
      if (scores.So3 > 2.3 && scores.A2 > 2.2) return 'FAKE';
      if (scores.E2 > 2.3 && avgA > 2) return 'MUM';
      if (scores.So3 > 2.2) return 'JOKE-R';
      if (avgAc < 2.2 && scores.S1 < 2) return 'MALO';
      if (avgS < 2 && avgA < 2) return 'IMFW';
      if (avgAc > 2.5) return 'GOGO';
      if (avgE > 2.5) return 'LOVE-R';
      if (avgA < 1.8) return 'DRUNK';
      if (avgS > 2.5 && avgAc > 2.3) return 'BOSS';
      if (scores.S1 > 2.5) return 'OJBK';
      if (avgSo < 1.8) return 'CTRL';
      if (avgE < 1.8) return 'POOR';
      if (scores.E1 > 2.5) return 'SEXY';
      
      return 'Dior-s';
    }
    
    // 显示结果
    function showResult() {
      const typeCode = calculateResult();
      const type = types[typeCode];
      
      if (!type) {
        console.error('Type not found:', typeCode);
        return;
      }
      
      dom.questionScreen.classList.add('hidden');
      dom.bottomNav.classList.add('hidden');
      dom.resultScreen.classList.remove('hidden');
      dom.progressFill.style.width = '100%';
      
      dom.resultType.textContent = type.cn;
      dom.resultCode.textContent = type.code;
      dom.resultImg.src = `./image/${typeCode}.png`;
      dom.resultImg.onerror = function() {
        this.src = `./image/${typeCode}.jpg`;
      };
      dom.resultIntro.textContent = type.intro || '';
      dom.resultDesc.textContent = type.desc || '';
    }
    
    // 重新测试
    function restart() {
      app.currentQ = 0;
      app.answers = {};
      
      dom.resultScreen.classList.add('hidden');
      dom.startScreen.classList.remove('hidden');
      dom.progressFill.style.width = '0%';
    }
  </script>
