<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>SBTI 人格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}

.top{position:fixed;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.2);z-index:10}
.top>div{height:100%;background:#fff;transition:width .3s ease}

.main{height:100vh;display:flex;align-items:center;justify-content:center;padding:60px 16px;perspective:1500px}

.card{width:100%;max-width:360px;background:#fff;border-radius:20px;padding:36px 28px;box-shadow:0 15px 50px rgba(0,0,0,.2);transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1),opacity .3s}
.card.swt{animation:swt .45s ease forwards}
.card.in{animation:in .45s cubic-bezier(.34,1.56,.64,1) forwards}
.card.hd{opacity:0;transform:translateX(-100%);pointer-events:none}

@keyframes swt{0%{transform:translateX(0) rotateY(0)}40%{transform:translateX(-50%) rotateY(15deg)}100%{transform:translateX(-100%) rotateY(0)}}
@keyframes in{0%{opacity:0;transform:translateX(50%) scale(.95) rotateY(-10deg)}100%{opacity:1;transform:translateX(0) scale(1) rotateY(0)}}

.tit{text-align:center;font-size:28px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{text-align:center;font-size:14px;color:#888;margin-bottom:8px}
.warn{text-align:center;font-size:13px;color:#e64980;margin-bottom:32px}
.btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:50px;font-size:16px;font-weight:500;cursor:pointer;box-shadow:0 8px 25px rgba(102,126,234,.4);transition:transform .2s}
.btn:active{transform:scale(.96)}
.author{text-align:center;font-size:12px;color:#aaa;margin-top:20px}
.author a{color:#667eea;text-decoration:none}

/* 问题页 - Canvas 渲染 */
.canvas-wrap{width:100%;margin-bottom:24px}
#qCanvas{width:100%;display:block}
.opts{display:flex;flex-direction:column;gap:10px;width:100%}
.opt{padding:14px;background:#f8f9fa;border:2px solid transparent;border-radius:12px;font-size:15px;color:#333;cursor:pointer;transition:all .15s;text-align:center}
.opt:active{transform:scale(.97)}
.opt.sl{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent}

.res{text-align:center}
.res>div:first-child{font-size:13px;color:#888;margin-bottom:8px}
.type{text-align:center;font-size:24px;font-weight:600;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.code{text-align:center;font-size:15px;color:#888;font-family:monospace;margin-bottom:16px}
.img{width:130px;height:130px;border-radius:16px;margin:0 auto 16px;display:block;box-shadow:0 8px 25px rgba(0,0,0,.15)}
.intro{text-align:center;font-size:14px;color:#667eea;margin-bottom:12px;font-style:italic}
.desc{background:#f8f9fa;padding:14px;border-radius:12px;font-size:13px;line-height:1.7;margin-bottom:20px;color:#555;text-align:left}
</style>
</head>
<body>
<div class="top"><div id="p" style="width:0%"></div></div>
<div class="main">
<div class="card" id="s">
<h1 class="tit">SBTI 人格测试</h1>
<p class="sub">Silly Big Personality Test</p>
<p class="warn">仅供娱乐</p>
<button class="btn" onclick="start()">开始测试</button>
<p class="author">原作者：<a href="https://space.bilibili.com/417038183">B站@蛆肉儿串儿</a></p>
</div>
<div class="card hd" id="q">
<div class="canvas-wrap"><canvas id="qCanvas"></canvas></div>
<div class="opts" id="o"></div>
</div>
<div class="card hd res" id="r">
<div>你的 SBTI 人格类型是</div>
<h2 class="type" id="ty"></h2>
<p class="code" id="co"></p>
<img class="img" id="im" src="">
<p class="intro" id="in"></p>
<div class="desc" id="de"></div>
<button class="btn" onclick="reset()">重新测试</button>
</div>
</div>

<script src="pretext.js"></script>
<script src="data.js"></script>
<script>
let i=0,a={},n=Q.length;
const s=document.getElementById('s');
const q=document.getElementById('q');
const r=document.getElementById('r');
const canvas=document.getElementById('qCanvas');
const ctx=canvas.getContext('2d');

// 使用 Pretext 渲染问题
function renderQ(text,num){
  const dpr=window.devicePixelRatio||1;
  const w=304;
  const fontSize=17;
  const lineHeight=26;
  const font=`${fontSize}px -apple-system, sans-serif`;
  
  // 使用 Pretext 准备文本
  const fullText=`第 ${num} 题 / 共 ${n} 题\n\n${text}`;
  const prepared=pretext.prepareWithSegments(fullText,font);
  const {lines,height}=pretext.layoutWithLines(prepared,w-20,lineHeight);
  
  // 设置 Canvas
  const h=height+30;
  canvas.width=w*dpr;
  canvas.height=h*dpr;
  canvas.style.width=w+'px';
  canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  
  // 清空
  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,w,h);
  
  // 渲染题号
  ctx.fillStyle='#999';
  ctx.font='13px -apple-system, sans-serif';
  ctx.textAlign='center';
  ctx.fillText(`第 ${num} 题 / 共 ${n} 题`,w/2,10);
  
  // 渲染问题
  ctx.fillStyle='#333';
  ctx.font=font;
  lines.slice(1).forEach((line,idx)=>{
    if(line.text)ctx.fillText(line.text,w/2,40+idx*lineHeight);
  });
}

function start(){
  s.classList.add('swt');
  setTimeout(()=>{s.classList.add('hd');q.classList.remove('hd');q.classList.add('in');show(0)},450);
}

function show(x){
  i=x;
  document.getElementById('p').style.width=(x+1)/n*100+'%';
  renderQ(Q[x].text,x+1);
  document.getElementById('o').innerHTML=Q[x].options.map(o=>`<div class="opt" onclick="ans(${o.value},this)">${o.label}</div>`).join('');
}

function ans(v,e){
  a[Q[i].id]=v;
  e.parentElement.querySelectorAll('.opt').forEach(x=>x.classList.remove('sl'));
  e.classList.add('sl');
  setTimeout(()=>{
    if(i<n-1){
      q.classList.add('swt');
      setTimeout(()=>{q.classList.add('hd');q.classList.remove('swt','sl');show(i+1);q.classList.remove('hd');q.classList.add('in')},450);
    }else{
      q.classList.add('swt');
      setTimeout(()=>{q.classList.add('hd');r.classList.remove('hd');r.classList.add('in');res()},450);
    }
  },250);
}

function res(){
  document.getElementById('p').style.width='100%';
  const c=calc(),t=T[c];
  document.getElementById('ty').textContent=t.cn;
  document.getElementById('co').textContent=t.code;
  document.getElementById('im').src='image/'+c+'.png';
  document.getElementById('im').onerror=()=>{document.getElementById('im').src='image/'+c+'.jpg'};
  document.getElementById('in').textContent=t.intro||'';
  document.getElementById('de').textContent=t.desc||'';
}

function calc(){
  const s={};
  Q.forEach(q=>{if(a[q.id])s[q.dim]=(s[q.dim]||0)+a[q.id]});
  const av=(a,b,c)=>((s[a]||2)+(s[b]||2)+(s[c]||2))/3;
  const S=av('S1','S2','S3'),E=av('E1','E2','E3'),A=av('A1','A2','A3'),Ac=av('Ac1','Ac2','Ac3'),So=av('So1','So2','So3');
  if(Ac<1.8)return'DEAD';
  if(s.E2>2.5&&So<2)return'ATM-er';
  if(s.E1<1.8&&s.So3>2.2)return'SOLO';
  if(s.S1<1.8&&s.S2<2)return'IMSB';
  if(s.So3>2.3&&s.A2>2.2)return'FAKE';
  if(s.E2>2.3&&A>2)return'MUM';
  if(s.So3>2.2)return'JOKE-R';
  if(Ac<2.2&&s.S1<2)return'MALO';
  if(S<2&&A<2)return'IMFW';
  if(Ac>2.5)return'GOGO';
  if(E>2.5)return'LOVE-R';
  if(A<1.8)return'DRUNK';
  if(S>2.5&&Ac>2.3)return'BOSS';
  if(s.S1>2.5)return'OJBK';
  if(So<1.8)return'CTRL';
  if(E<1.8)return'POOR';
  if(s.E1>2.5)return'SEXY';
  return'Dior-s';
}

function reset(){
  i=0;a={};
  r.classList.add('swt');
  setTimeout(()=>{r.classList.add('hd');s.classList.remove('hd');s.classList.add('in');document.getElementById('p').style.width='0%'},450);
}
</script>
</body>
</html>
