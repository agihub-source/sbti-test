<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SBTI人格测试</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);overflow:hidden;-webkit-tap-highlight-color:transparent}

/* 顶部进度 */
.h{position:fixed;top:0;left:0;right:0;padding:16px;background:rgba(255,255,255,.15);display:flex;gap:12px;align-items:center;z-index:10;backdrop-filter:blur(10px)}
.pt{color:#fff;font-size:14px;font-weight:600}
.pb{flex:1;height:6px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden}
.pf{height:100%;background:#fff;border-radius:3px;transition:width .3s ease}

/* 主容器 */
.a{height:100vh;display:flex;align-items:center;justify-content:center;padding:70px 16px 20px;perspective:1200px}

/* 卡片容器 */
.cs{position:relative;width:100%;max-width:360px;height:450px}

/* 卡片 */
.c{position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;border-radius:24px;padding:32px 24px;box-shadow:0 20px 60px rgba(0,0,0,.25);transform-style:preserve-3d}

/* 卡片动画状态 */
.c.in{animation:cardIn .5s cubic-bezier(.34,1.56,.64,1) forwards}
.c.out{animation:cardOut .4s ease-in forwards}
.c.idle{transform:translateX(0) rotateY(0);opacity:1}
.c.hid{display:none}

@keyframes cardIn{
  0%{transform:translateX(100%) rotateY(-15deg);opacity:0}
  100%{transform:translateX(0) rotateY(0);opacity:1}
}
@keyframes cardOut{
  0%{transform:translateX(0) rotateY(0);opacity:1}
  30%{transform:translateX(-30%) rotateY(10deg);opacity:.8}
  100%{transform:translateX(-120%) rotateY(25deg);opacity:0}
}

/* 内容样式 */
.t{font-size:30px;font-weight:700;text-align:center;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.s{text-align:center;color:#888;font-size:14px;margin-bottom:8px}
.w{text-align:center;color:#e64980;font-size:13px;margin-bottom:28px}
.b{display:block;width:100%;padding:16px;font-size:18px;color:#fff;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:50px;cursor:pointer;box-shadow:0 8px 25px rgba(102,126,234,.4);transition:transform .2s,box-shadow .2s}
.b:active{transform:scale(.95);box-shadow:0 4px 15px rgba(102,126,234,.3)}
.au{text-align:center;color:#aaa;font-size:12px;margin-top:20px}
.au a{color:#667eea;text-decoration:none}

/* 问题样式 */
.n{display:inline-block;padding:6px 14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:16px;font-size:13px;margin-bottom:16px}
.q{font-size:18px;font-weight:600;line-height:1.6;margin-bottom:24px;color:#333}
.o{display:flex;flex-direction:column;gap:12px}
.i{padding:16px 18px;background:#f8f9fa;border:2px solid #e9ecef;border-radius:14px;font-size:15px;text-align:center;cursor:pointer;transition:all .2s ease;color:#495057}
.i:hover{background:#e9ecef;border-color:#dee2e6}
.i:active{transform:scale(.97)}
.i.s{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent;transform:scale(1.02);box-shadow:0 5px 20px rgba(102,126,234,.3)}

/* 结果样式 */
.rl{text-align:center;color:#888;font-size:13px;margin-bottom:8px}
.rt{font-size:28px;font-weight:700;text-align:center;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.rc{text-align:center;color:#888;font-family:monospace;letter-spacing:2px;margin-bottom:16px}
.rm{width:150px;height:150px;border-radius:18px;margin:12px auto;display:block;box-shadow:0 10px 30px rgba(0,0,0,.15);object-fit:cover}
.ri{text-align:center;color:#667eea;font-size:14px;font-style:italic;margin-bottom:12px}
.rd{background:#f8f9fa;padding:14px;border-radius:12px;font-size:13px;line-height:1.7;margin-bottom:20px;color:#495057}
</style>
</head>
<body>
<div class="h">
<span class="pt" id="pt">开始</span>
<div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
</div>

<div class="a">
<div class="cs">
<!-- 开始卡片 -->
<div class="c idle" id="sc">
<h1 class="t">SBTI人格测试</h1>
<p class="s">Silly Big Personality Test</p>
<p class="w">仅供娱乐</p>
<button class="b" id="sb">开始测试</button>
<p class="au">原作者：<a href="https://space.bilibili.com/417038183">B站@蛆肉儿串儿</a></p>
</div>

<!-- 问题卡片 -->
<div class="c hid" id="qc">
<div class="n" id="qn">第 1 题</div>
<div class="q" id="qt"></div>
<div class="o" id="os"></div>
</div>

<!-- 结果卡片 -->
<div class="c hid" id="rc">
<p class="rl">你的 SBTI 人格类型是</p>
<h2 class="rt" id="rtt"></h2>
<p class="rc" id="rco"></p>
<img class="rm" id="ri" src="">
<p class="ri" id="rin"></p>
<div class="rd" id="rd"></div>
<button class="b" id="rb">重新测试</button>
</div>
</div>
</div>

<script src="data.js"></script>
<script>
let i=0,A={},N=Q.length;
let sc=document.getElementById('sc');
let qc=document.getElementById('qc');
let rc=document.getElementById('rc');

// 开始测试
document.getElementById('sb').onclick=function(){
  sc.classList.remove('idle');
  sc.classList.add('out');
  
  setTimeout(()=>{
    sc.classList.add('hid');
    qc.classList.remove('hid');
    qc.classList.add('in');
    
    setTimeout(()=>qc.classList.replace('in','idle'),500);
    show(0);
  },400);
};

// 显示问题
function show(n){
  i=n;
  document.getElementById('pt').textContent=(n+1)+'/'+N;
  document.getElementById('pf').style.width=(n+1)/N*100+'%';
  document.getElementById('qn').textContent='第 '+n+1+' 题';
  document.getElementById('qt').textContent=Q[n].text;
  document.getElementById('os').innerHTML=Q[n].options.map(o=>'<div class="i" onclick="ans('+o.value+',this)">'+o.label+'</div>').join('');
}

// 选择答案
function ans(v,e){
  A[Q[i].id]=v;
  e.parentElement.querySelectorAll('.i').forEach(x=>x.classList.remove('s'));
  e.classList.add('s');
  
  setTimeout(()=>{
    if(i<N-1){
      // 当前卡片飞走
      qc.classList.remove('idle');
      qc.classList.add('out');
      
      setTimeout(()=>{
        qc.classList.add('hid');
        qc.classList.remove('out');
        
        // 下一个问题内容
        show(i+1);
        
        // 新卡片飞入
        qc.classList.remove('hid');
        qc.classList.add('in');
        setTimeout(()=>qc.classList.replace('in','idle'),500);
      },400);
    }else{
      showResult();
    }
  },300);
}

// 显示结果
function showResult(){
  qc.classList.remove('idle');
  qc.classList.add('out');
  
  setTimeout(()=>{
    qc.classList.add('hid');
    rc.classList.remove('hid');
    rc.classList.add('in');
    setTimeout(()=>rc.classList.replace('in','idle'),500);
    
    document.getElementById('pf').style.width='100%';
    let c=calc(),t=T[c];
    document.getElementById('rtt').textContent=t.cn;
    document.getElementById('rco').textContent=t.code;
    document.getElementById('ri').src='image/'+c+'.png';
    document.getElementById('ri').onerror=function(){this.src='image/'+c+'.jpg'};
    document.getElementById('rin').textContent=t.intro||'';
    document.getElementById('rd').textContent=t.desc||'';
  },400);
}

// 计算结果
function calc(){
  let s={};
  Q.forEach(q=>{if(A[q.id])s[q.dim]=(s[q.dim]||0)+A[q.id]});
  let av=(a,b,c)=>((s[a]||2)+(s[b]||2)+(s[c]||2))/3;
  let S=av('S1','S2','S3'),E=av('E1','E2','E3'),A=av('A1','A2','A3'),Ac=av('Ac1','Ac2','Ac3'),So=av('So1','So2','So3');
  if(Ac<1.8)return'DEAD';
  if(s.E2>2.5&&So<2)return'ATM-er';
  if(s.E1<1.8&&s.So3>2.2)return'SOLO';
  if(s.S1<1.8&&s.S2<2)return'IMSB';
  if(s.So3>2.3&&s.A2>2.2)return'FAKE';
  if(s.E2>2.3&&A>2)return'MUM';
  if(s.So3>2.2)return'JOKE-R';
  if(Ac<2.2&&s.S1<2)return'MALO';
  if(S<2&&A<2)return'IMFW';
  if(Ac>2.5)return'GOGO';
  if(E>2.5)return'LOVE-R';
  if(A<1.8)return'DRUNK';
  if(S>2.5&&Ac>2.3)return'BOSS';
  if(s.S1>2.5)return'OJBK';
  if(So<1.8)return'CTRL';
  if(E<1.8)return'POOR';
  if(s.E1>2.5)return'SEXY';
  return'Dior-s';
}

// 重新测试
document.getElementById('rb').onclick=function(){
  i=0;A={};
  rc.classList.remove('idle');
  rc.classList.add('out');
  
  setTimeout(()=>{
    rc.classList.add('hid');
    sc.classList.remove('hid');
    sc.classList.add('in');
    setTimeout(()=>sc.classList.replace('in','idle'),500);
    
    document.getElementById('pf').style.width='0%';
    document.getElementById('pt').textContent='开始';
  },400);
};
</script>
</body>
</html>
