<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>SBTI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;background:#fafafa;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}

/* 进度条 */
.top{position:fixed;top:0;left:0;right:0;height:3px;background:#eee;z-index:10}
.top>div{height:100%;background:#333;transition:width .3s ease}

/* 主容器 */
.main{height:100vh;display:flex;align-items:center;justify-content:center;padding:60px 16px;perspective:1500px}

/* 卡片 */
.card{width:100%;max-width:340px;background:#fff;border-radius:20px;padding:40px 28px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 8px 40px rgba(0,0,0,.06);transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1),opacity .3s}
.card.swt{animation:swt .45s ease forwards}
.card.in{animation:in .45s ease forwards}
.card.hd{opacity:0;transform:translateX(-100%);pointer-events:none}

@keyframes swt{0%{transform:translateX(0) rotateY(0)}40%{transform:translateX(-50%) rotateY(15deg)}100%{transform:translateX(-100%) rotateY(0)}}
@keyframes in{0%{opacity:0;transform:translateX(50%) scale(.95)}100%{opacity:1;transform:translateX(0) scale(1)}}

/* 开始页 */
.tit{text-align:center;font-size:28px;font-weight:600;letter-spacing:-.5px;color:#111;margin-bottom:8px}
.sub{text-align:center;font-size:14px;color:#666;margin-bottom:40px}
.btn{display:block;width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:500;cursor:pointer;transition:background .2s}
.btn:active{background:#333}

/* 问题页 */
.num{color:#999;font-size:12px;margin-bottom:20px}
.q{text-align:center;font-size:17px;font-weight:500;line-height:1.6;color:#111;margin-bottom:32px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{padding:14px;background:#f5f5f5;border:none;border-radius:10px;font-size:14px;color:#333;cursor:pointer;transition:all .15s;text-align:center}
.opt:active{background:#eee;transform:scale(.98)}
.opt.sl{background:#111;color:#fff}

/* 结果页 */
.res{text-align:center}
.res>div:first-child{font-size:12px;color:#999;margin-bottom:8px}
.type{text-align:center;font-size:24px;font-weight:600;color:#111;margin-bottom:4px}
.code{text-align:center;font-size:13px;color:#999;font-family:"SF Mono",monospace;margin-bottom:20px}
.img{width:120px;height:120px;border-radius:12px;margin:0 auto 16px;display:block}
.intro{text-align:center;font-size:14px;color:#666;margin-bottom:16px;font-style:italic}
.desc{background:#f8f8f8;padding:14px;border-radius:10px;font-size:13px;line-height:1.7;margin-bottom:24px;color:#333}
</style>
</head>
<body>
<div class="top"><div id="p" style="width:0%"></div></div>
<div class="main">
<div class="card" id="s">
<h1 class="tit">SBTI</h1>
<p class="sub">人格测试</p>
<button class="btn" onclick="start()">开始</button>
</div>
<div class="card hd" id="q">
<div class="num" id="n"></div>
<div class="q" id="t"></div>
<div class="opts" id="o"></div>
</div>
<div class="card hd res" id="r">
<div>你的类型</div>
<h2 class="type" id="ty"></h2>
<p class="code" id="co"></p>
<img class="img" id="im" src="">
<p class="intro" id="in"></p>
<div class="desc" id="de"></div>
<button class="btn" onclick="reset()">重新测试</button>
</div>
</div>
<script src="data.js"></script>
<script>
let i=0,a={},n=Q.length;
const s=document.getElementById('s');
const q=document.getElementById('q');
const r=document.getElementById('r');

function start(){
  s.classList.add('swt');
  setTimeout(()=>{s.classList.add('hd');q.classList.remove('hd');q.classList.add('in');show(0)},450);
}

function show(x){
  i=x;
  document.getElementById('p').style.width=(x+1)/n*100+'%';
  document.getElementById('n').textContent=x+1+'/'+n;
  document.getElementById('t').textContent=Q[x].text;
  document.getElementById('o').innerHTML=Q[x].options.map(o=>'<div class="opt" onclick="ans('+o.value+',this)">'+o.label+'</div>').join('');
}

function ans(v,e){
  a[Q[i].id]=v;
  e.parentElement.querySelectorAll('.opt').forEach(x=>x.classList.remove('sl'));
  e.classList.add('sl');
  setTimeout(()=>{
    if(i<n-1){
      q.classList.add('swt');
      setTimeout(()=>{q.classList.add('hd');q.classList.remove('swt','sl');show(i+1);q.classList.remove('hd');q.classList.add('in')},450);
    }else{
      q.classList.add('swt');
      setTimeout(()=>{q.classList.add('hd');r.classList.remove('hd');r.classList.add('in');res()},450);
    }
  },250);
}

function res(){
  document.getElementById('p').style.width='100%';
  const c=calc(),t=T[c];
  document.getElementById('ty').textContent=t.cn;
  document.getElementById('co').textContent=t.code;
  document.getElementById('im').src='image/'+c+'.png';
  document.getElementById('im').onerror=()=>{document.getElementById('im').src='image/'+c+'.jpg'};
  document.getElementById('in').textContent=t.intro||'';
  document.getElementById('de').textContent=t.desc||'';
}

function calc(){
  const s={};
  Q.forEach(q=>{if(a[q.id])s[q.dim]=(s[q.dim]||0)+a[q.id]});
  const av=(a,b,c)=>((s[a]||2)+(s[b]||2)+(s[c]||2))/3;
  const S=av('S1','S2','S3'),E=av('E1','E2','E3'),A=av('A1','A2','A3'),Ac=av('Ac1','Ac2','Ac3'),So=av('So1','So2','So3');
  if(Ac<1.8)return'DEAD';
  if(s.E2>2.5&&So<2)return'ATM-er';
  if(s.E1<1.8&&s.So3>2.2)return'SOLO';
  if(s.S1<1.8&&s.S2<2)return'IMSB';
  if(s.So3>2.3&&s.A2>2.2)return'FAKE';
  if(s.E2>2.3&&A>2)return'MUM';
  if(s.So3>2.2)return'JOKE-R';
  if(Ac<2.2&&s.S1<2)return'MALO';
  if(S<2&&A<2)return'IMFW';
  if(Ac>2.5)return'GOGO';
  if(E>2.5)return'LOVE-R';
  if(A<1.8)return'DRUNK';
  if(S>2.5&&Ac>2.3)return'BOSS';
  if(s.S1>2.5)return'OJBK';
  if(So<1.8)return'CTRL';
  if(E<1.8)return'POOR';
  if(s.E1>2.5)return'SEXY';
  return'Dior-s';
}

function reset(){
  i=0;a={};
  r.classList.add('swt');
  setTimeout(()=>{r.classList.add('hd');s.classList.remove('hd');s.classList.add('in');document.getElementById('p').style.width='0%'},450);
}
</script>
</body>
</html>
